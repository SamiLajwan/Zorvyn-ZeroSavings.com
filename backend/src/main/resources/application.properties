spring.application.name=finance-dashboard

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=finance-dashboard-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000

server.port=8080

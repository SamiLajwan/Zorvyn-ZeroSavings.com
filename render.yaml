services:
  - type: web
    name: zerosavings-api
    runtime: java
    buildCommand: cd backend && wget -q https://archive.apache.org/dist/maven/maven-3/3.9.6/binaries/apache-maven-3.9.6-bin.tar.gz && tar -xzf apache-maven-3.9.6-bin.tar.gz && ./apache-maven-3.9.6/bin/mvn clean package -DskipTests
    startCommand: cd backend && java -jar target/dashboard-1.0.0.jar
    envVars:
      - key: CORS_ALLOWED_ORIGIN
        value: "*"
